# DINOv3 + EoMT (Encoder-only Mask Transformer) Configuration
# Paper: GuideTWSI (ICRA 2026)
# DINOv3 backbone fine-tuned with EoMT via lightly-train for TWSI segmentation

model:
  backbone: dinov3_vits16
  decoder: eomt
  lightly_model: "dinov3/vits16-eomt"
  task: semantic_segmentation

  # EoMT model details
  eomt:
    num_queries: 100
    attention_mask_annealing: true

data:
  format: image_mask  # train/images/*.jpg + train/masks/*.png
  num_classes: 2
  class_mapping:
    0: "background"
    255: "tactile-paving"

training:
  max_iterations: 100000
  image_size: [518, 518]  # (height, width)

  # Normalization (ImageNet)
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

  # Training settings
  resume_interrupted: true

  # Requires DINOv3 checkpoint URL from Meta
  # backbone_url: "https://..."

# Lightly-train API reference
lightly_train:
  version: ">=0.11.2"
  function: train_semantic_segmentation

evaluation:
  metrics: ["precision", "recall", "mAP50-95", "mIoU"]
